<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Form</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Prompt', sans-serif;

      background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center/cover;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass-form {
      width: 100%;
      max-width: 500px;

      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;

      padding: 40px;

      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);

      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .glass-form h3 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: bold;
    }

    .form-control, .form-select {
      background: rgba(255,255,255,0.7);
      border: none;
      border-radius: 10px;
    }

    .btn-primary {
      background: #0d6efd;
      border: none;
    }

    .btn-danger {
      background: #dc3545;
      border: none;
    }

    .btn-primary:hover {
      background: #0b5ed7;
    }

    .btn-danger:hover {
      background: #bb2d3b;
    }
  </style>
</head>

<body>

<form class="glass-form">
  <h3>แบบฟอร์มลงทะเบียน</h3>

  <div class="mb-3">
    <label class="form-label">ชื่อ-นามสกุล</label>
    <input type="text" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
  </div>

  <div class="mb-3">
    <label class="form-label">อีเมล</label>
    <input type="email" class="form-control" placeholder="example@domain.com" required>
  </div>

  <div class="mb-3">
    <label class="form-label">รหัสผ่าน</label>
    <input type="password" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label d-block">เพศ</label>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" name="gender">
      <label class="form-check-label">ชาย</label>
    </div>
    <div class="form-check form-check-inline">
      <input class="form-check-input" type="radio" name="gender">
      <label class="form-check-label">หญิง</label>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">ตำแหน่ง</label>
    <select class="form-select" required>
      <option selected disabled>กรุณาเลือกตำแหน่ง</option>
      <option>Web Developer</option>
      <option>Designer</option>
      <option>Project Manager</option>
      <option>Tester</option>
      <option>UX/UI Designer</option>
    </select>
  </div>

  <div class="text-center">
    <button type="submit" class="btn btn-primary me-2">ลงทะเบียน</button>
    <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
  </div>
</form>

</body>
</html>
